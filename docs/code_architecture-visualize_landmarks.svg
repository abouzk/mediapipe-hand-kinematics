path, confidence, hand_only flag<br/>    Calls download_models then opens video and writes annotated output</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-DL-1" transform="translate(138, 379)"><rect class="basic label-container" style="" x="-130" y="-87" width="260" height="174"></rect><g class="label" style="" transform="translate(-100, -72)"><rect></rect><foreignObject width="200" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>download_models()<br/>    Same as rate_cmajor -- checks locally first<br/>    Downloads hand and pose model files on first run</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-CREATE-2" transform="translate(448, 379)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"></rect><g class="label" style="" transform="translate(-100, -84)"><rect></rect><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>create_landmarkers()<br/>    Initializes HandLandmarker and PoseLandmarker<br/>    Uses VIDEO mode for frame-to-frame tracking stability</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-LOOP-3" transform="translate(758, 379)"><rect class="basic label-container" style="" x="-130" y="-123" width="260" height="246"></rect><g class="label" style="" transform="translate(-100, -108)"><rect></rect><foreignObject width="200" height="216"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Frame loop<br/>    Reads each frame with OpenCV<br/>    Converts to RGB and wraps in MediaPipe Image object<br/>    Passes timestamp so VIDEO mode tracking works correctly</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-HAND-4" transform="translate(293, 723)"><rect class="basic label-container" style="" x="-130" y="-123" width="260" height="246"></rect><g class="label" style="" transform="translate(-100, -108)"><rect></rect><foreignObject width="200" height="216"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>draw_hand()<br/>    Draws all 21 hand landmarks as circles<br/>    Connects them with lines along finger and palm structure<br/>    Highlights wrist landmark 0 in red as the key measurement point</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-ARM-5" transform="translate(603, 723)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"></rect><g class="label" style="" transform="translate(-100, -84)"><rect></rect><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>draw_arm()<br/>    Draws shoulder, elbow, and wrist from pose model<br/>    Highlights elbow in yellow with a text label<br/>    Skipped if --hand_only flag is set</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-OUT-6" transform="translate(913, 723)"><rect class="basic label-container" style="" x="-130" y="-87" width="260" height="174"></rect><g class="label" style="" transform="translate(-100, -72)"><rect></rect><foreignObject width="200" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Write annotated frame to output MP4<br/>    Overlays frame counter for reference<br/>    Prints detection rate summary when complete</p></span></div></foreignObject></g></g></g></g></g></g></svg>